parent_contract: b_class_auxiliary/coding_guards/reproducibility_contract.yaml
stage: 04_Baseline
dataset: glas
model: paired_a2_unet_b1_resnet34_unet
eval_proto_version: eval_proto_v1
train_proto_version: train_proto_v1
config_version: original_protocol_reproduction
bn_policy_version: none_in_v1
bn_policy_scope:
  A2: inherited_train_proto_v1
  B1: inherited_train_proto_v1
bn_affine_trainable: inherited_model_defaults

runs:
  - run_name: A2_UNet_GlaS_seed3407
    seed: 3407
    config: configs/experiment/A2_UNet_GlaS_seed3407.yaml
    output_dir: experiments/A2_UNet_GlaS_seed3407
  - run_name: A2_UNet_GlaS_seed1234
    seed: 1234
    config: configs/experiment/A2_UNet_GlaS_seed1234.yaml
    output_dir: experiments/A2_UNet_GlaS_seed1234
  - run_name: A2_UNet_GlaS_seed2025
    seed: 2025
    config: configs/experiment/A2_UNet_GlaS_seed2025.yaml
    output_dir: experiments/A2_UNet_GlaS_seed2025
  - run_name: B1_ResNet34_UNet_GlaS_seed3407
    seed: 3407
    config: configs/experiment/B1_ResNet34_UNet_GlaS_seed3407.yaml
    output_dir: experiments/B1_ResNet34_UNet_GlaS_seed3407
  - run_name: B1_ResNet34_UNet_GlaS_seed1234
    seed: 1234
    config: configs/experiment/B1_ResNet34_UNet_GlaS_seed1234.yaml
    output_dir: experiments/B1_ResNet34_UNet_GlaS_seed1234
  - run_name: B1_ResNet34_UNet_GlaS_seed2025
    seed: 2025
    config: configs/experiment/B1_ResNet34_UNet_GlaS_seed2025.yaml
    output_dir: experiments/B1_ResNet34_UNet_GlaS_seed2025

splits:
  train: 68
  val: 17
  testA: 60
  testB: 20
sample_count:
  raw_per_seed: 42
  meanstd_rows: 14
metric_set:
  - dice
  - iou
  - objdice
  - objf1
  - hausdorff
  - hd95
  - boundary_f1
raw_schema:
  semantic: sample_only
  aggregate_rows_in_raw: false
  required_fields: [stage, run_name, seed, split, sample_id, metric_name, metric_value]
aggregate_policy:
  semantic: independent_derived_statistics
  meanstd_rows: 14
  ddof: 0
  split_separation: [TestA, TestB]

lineage:
  source_stage: 03_UNet稳定性
  source_manifest: reports/tables/unet_stage_manifest.csv
  source_protocol_version: eval_proto_v1
  source_run_name: A2_UNet_GlaS_seed3407,A2_UNet_GlaS_seed1234,A2_UNet_GlaS_seed2025
  consumer_stage: 04_Baseline
  consumer_file: 结直肠腺体分割_plan_优化版/01_实验执行/04_Baseline/04_阶段验收.md
  consumption_boundary: 03 A2 artifacts are protocol reference only; current 04 A2/B1 results must be freshly generated as a paired train_proto_v1/eval_proto_v1 reproduction; only encoder architecture differs; historical v2/v3 artifacts excluded

required_paths:
  - name: research_gate
    path: b_class_auxiliary/coding_guards/04_Baseline/research_alignment_gate_report.md
  - name: stage_definition_gate
    path: b_class_auxiliary/coding_guards/04_Baseline/stage_definition_gate_report.md
  - name: precheck_gate
    path: b_class_auxiliary/coding_guards/04_Baseline/precheck_doc_gate_report.md
  - name: source_manifest
    path: reports/tables/unet_stage_manifest.csv
  - name: eval_config
    path: configs/eval/eval_proto_v1.yaml
  - name: data_config
    path: configs/data/glas.yaml
  - name: model_a2_config
    path: configs/model/unet_v1.yaml
  - name: model_b1_config
    path: configs/model/resnet34_unet.yaml
  - name: train_config
    path: configs/train/unet_flow_v1.yaml
  - name: implementation_basis_archive
    path: reports/stage_reports/implementation_tracking/04_Baseline/实现依据记录.md
  - name: implementation_basis_root_copy
    path: b_class_auxiliary/coding_guards/04_Baseline/实现依据记录.md

pretrained_weight:
  source: torchvision ResNet34 IMAGENET1K_V1
  torchvision_version: 0.17.2+cu121
  cache_path: weights/resnet34-b627a593.pth
  sha256: b627a593bcbe140c234610266fe4f8ae95ea42fc881d091c9b6052e6b1d0590f
  offline_policy: load_from_verified_local_cache_without_network

freshness:
  current_round: fresh_original_protocol_reproduction
  historical_reset_id: fresh_reset_original_protocol_reproduction
  historical_exclusion: experiments/_historical_archive;experiments/*__historical_*;experiments/*__smoke;experiments/*__runtime_probe;configs/experiment/_historical_archive
  required_before_run: current code/config/manifest/contract must be frozen, then isolated runtime and smoke, formal outputs and independent metric reports regenerated
