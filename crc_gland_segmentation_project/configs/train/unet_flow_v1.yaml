train_proto_version: train_proto_v1
aug_version: light_aug_v1
aug_profile_name: light_aug_v1
eval_aug_enable: false
loss_name: bce_dice
loss_version: seg_loss_v1
bce_weight: 1.0
dice_weight: 1.0
loss_eps: 1.0e-6
optimizer: AdamW
lr: 0.001
weight_decay: 0.0001
scheduler: ReduceLROnPlateau
scheduler_monitor: val_objdice
scheduler_factor: 0.5
scheduler_patience: 5
scheduler_min_lr: 1.0e-6
epoch_max: 120
early_stop_patience: 20
batch_size: 2
num_workers: 0
amp: true
smoke_epochs: 1
smoke_train_batches: 2
smoke_val_batches: 2
light_aug:
  random_hflip_prob: 0.5
  random_vflip_prob: 0.5
  rotate90_enable: true
  rotate90_prob: 0.5
  crop_scale_min: 0.9
  crop_scale_max: 1.0
  crop_ratio_min: 0.95
  crop_ratio_max: 1.05
  random_resized_crop_prob: 0.3
  brightness_prob: 0.2
  brightness_limit: 0.1
  contrast_prob: 0.2
  contrast_limit: 0.1
